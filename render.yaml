services:
  - type: web
    name: worldcup-predictor
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: worldcup-predictor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: worldcup-predictor-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TOURNAMENT_START_TIME
        value: "2026-06-11T00:00:00.000Z"
      - key: WORLD_CUP_COMPETITION_CODE
        value: WC
      - key: FOOTBALL_API_BASE_URL
        value: https://api.football-data.org/v4
      - key: FOOTBALL_API_KEY
        sync: false
      - key: ENABLE_BACKGROUND_JOBS
        value: "true"
  - type: redis
    name: worldcup-predictor-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: worldcup-predictor-db
    plan: starter
    postgresMajorVersion: 16
