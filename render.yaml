services:
  - type: web
    name: worldcup-predictor-web
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: TOURNAMENT_START_TIME
        value: "2026-06-11T00:00:00.000Z"
      - key: WORLD_CUP_COMPETITION_CODE
        value: WC
      - key: FOOTBALL_API_BASE_URL
        value: https://api.football-data.org/v4
      - key: FOOTBALL_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PASSWORD_RESET_FROM_EMAIL
        sync: false
      - key: ENABLE_BACKGROUND_JOBS
        value: "false"

  - type: worker
    name: worldcup-predictor-worker
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run prisma:generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TOURNAMENT_START_TIME
        value: "2026-06-11T00:00:00.000Z"
      - key: WORLD_CUP_COMPETITION_CODE
        value: WC
      - key: FOOTBALL_API_BASE_URL
        value: https://api.football-data.org/v4
      - key: FOOTBALL_API_KEY
        sync: false
      - key: ENABLE_BACKGROUND_JOBS
        value: "true"
